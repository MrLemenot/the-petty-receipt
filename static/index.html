<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Petty Receipt</title>
    <style>
        /* Строгий минимализм: только белый и черный */
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            max-width: 500px;
            width: 90%;
            margin-top: 50px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            text-transform: uppercase;
            border-bottom: 2px dashed #000;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        p {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* Поля ввода и кнопки в стиле кассового аппарата */
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #000;
            background-color: #fff;
            color: #000;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            outline: none;
            border-width: 2px;
        }

        button {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 15px 30px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            transition: background 0.2s, color 0.2s;
        }

        button:hover {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }

        /* Место под готовую картинку чека */
        #receipt-result {
            margin-top: 40px;
            display: none;
        }
        
        #receipt-result img {
            max-width: 100%;
            height: auto;
            border: 1px solid #000;
            box-shadow: 5px 5px 0px #000;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>The Petty Receipt</h1>
        <p>Audit your life choices and get a receipt for your missed deadlines.</p>

        <form id="quiz-form">
            <input type="text" id="answer1" placeholder="What did you procrastinate on today?" required>
            <input type="text" id="answer2" placeholder="How many hours did you waste?" required>
            <button type="submit">Print My Receipt</button>
        </form>

        <div id="receipt-result">
            <p>*** YOUR RECEIPT IS READY ***</p>
            <img id="receipt-image" src="" alt="Your Petty Receipt">
        </div>
    </div>

    <script>
        // Здесь твоя логика отправки данных на сервер
        document.getElementById('quiz-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Временно меняем текст кнопки
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "PRINTING...";

            // Собираем данные
            const data = {
                // Подставь свои ключи, которые ждет бэкенд
                q1: document.getElementById('answer1').value,
                q2: document.getElementById('answer2').value
            };

            try {
                // Вызов твоего API (укажи правильный эндпоинт)
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    // Если бэкенд возвращает картинку
                    const blob = await response.blob();
                    const imgUrl = URL.createObjectURL(blob);
                    
                    document.getElementById('receipt-image').src = imgUrl;
                    document.getElementById('receipt-result').style.display = 'block';
                } else {
                    alert("Error printing receipt. Terminal malfunction.");
                }
            } catch (error) {
                console.error("Fetch error: ", error);
            } finally {
                btn.innerText = originalText;
            }
        });
    </script>
</body>
</html>
